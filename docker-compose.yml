services:
  api1:
    build: .
    environment:
      - SOCKET_PATH=/var/run/rinha/api1.sock
      - MALLOC_ARENA_MAX=1
      - MALLOC_TRIM_THRESHOLD_=-1
    volumes:
      - sockets:/var/run/rinha
    security_opt:
      - seccomp:unconfined
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.47"
          memory: "160MB"

  api2:
    build: .
    environment:
      - SOCKET_PATH=/var/run/rinha/api2.sock
      - MALLOC_ARENA_MAX=1
      - MALLOC_TRIM_THRESHOLD_=-1
    volumes:
      - sockets:/var/run/rinha
    depends_on:
      - api1
    security_opt:
      - seccomp:unconfined
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.47"
          memory: "160MB"

  haproxy:
    image: docker.io/library/haproxy:3.1-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/var/run/rinha
    depends_on:
      - api1
      - api2
    security_opt:
      - seccomp:unconfined
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.06"
          memory: "30MB"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
